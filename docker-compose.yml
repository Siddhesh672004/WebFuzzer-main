# SmartFuzz — self-contained Docker setup.
# Bundles MongoDB + Redis locally so the whole stack runs offline with no
# external database or IP whitelisting required:
#
#   docker compose up --build
#
# MONGO_URI / REDIS_HOST are overridden per-service below (these take precedence
# over .env), so your .env can keep an Atlas URI for non-Docker use without
# affecting the containers. First run seeds the payload library via `seed`.

services:
  mongo:
    image: mongo:7
    container_name: smartfuzz-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: smartfuzz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartfuzz-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Point at the bundled containers, not localhost / Atlas (overrides .env).
      - MONGO_URI=mongodb://mongo:27017/smartfuzz
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Shared screenshot evidence directory (written by worker, served by backend)
      - SCREENSHOT_DIR=/var/lib/smartfuzz/screenshots
    ports:
      - "4000:4000"
    volumes:
      - screenshots-data:/var/lib/smartfuzz/screenshots
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/ping').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: smartfuzz-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/smartfuzz
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Shared screenshot evidence directory (written here, served by backend)
      - SCREENSHOT_DIR=/var/lib/smartfuzz/screenshots
      # Use the system Chromium installed in the worker image (see worker/Dockerfile).
      # Alpine's chromium package installs the binary at /usr/bin/chromium-browser.
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    volumes:
      - screenshots-data:/var/lib/smartfuzz/screenshots
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartfuzz-seed
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/smartfuzz
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: ["node", "payloads/seed.js"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smartfuzz-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo-data:
  redis-data:
  screenshots-data:
