# SmartFuzz — Docker-only setup.
# Uses MongoDB Atlas (from .env) + local Redis container.
#
#   docker compose up --build
#
# First run seeds the payload library automatically via the `seed` service.

services:
  redis:
    image: redis:7-alpine
    container_name: smartfuzz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartfuzz-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Redis points to the container, not localhost
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # MONGO_URI comes from .env (Atlas) — NOT overridden here
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/ping').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: smartfuzz-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # MONGO_URI comes from .env (Atlas)
    depends_on:
      redis:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartfuzz-seed
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: ["node", "payloads/seed.js"]
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smartfuzz-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis-data:
